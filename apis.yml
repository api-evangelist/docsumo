aid: docsumo
url: https://raw.githubusercontent.com/api-evangelist/docsumo/refs/heads/main/apis.yml
name: Docsumo
kind: company
description: Docsumo is an intelligent document processing (IDP) platform that uses
  OCR, computer vision, and machine learning to convert unstructured documents -
  invoices, bank statements, pay stubs, receipts, tax forms - into structured,
  validated data. The REST API at https://app.docsumo.com/api/v1 uploads documents,
  retrieves AI-extracted data, supports human-in-the-loop review, and emits
  webhooks as documents finish processing.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Document Processing
- IDP
- OCR
- Data Extraction
- AI
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
